<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMW Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">TMW</div>
    <nav>
      <a href="#" class="nav-item active">개요</a>
      <a href="#" class="nav-item">매출</a>
      <a href="#" class="nav-item">사용자</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 class="page-title">개요</h1>
      <span class="date" id="today"></span>
    </header>

    <!-- KPI 카드 -->
    <section class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">총 순매출 (Net)</div>
        <div class="kpi-value" id="kpi-revenue">—</div>
        <div class="kpi-sub" id="kpi-revenue-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">총 판매량</div>
        <div class="kpi-value" id="kpi-sales">—</div>
        <div class="kpi-sub" id="kpi-sales-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">평균 DAU</div>
        <div class="kpi-value" id="kpi-dau">—</div>
        <div class="kpi-sub" id="kpi-dau-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">평균 환불률</div>
        <div class="kpi-value" id="kpi-refund">—</div>
        <div class="kpi-sub" id="kpi-refund-sub"></div>
      </div>
    </section>

    <!-- 차트 영역 -->
    <section class="chart-grid">

      <div class="chart-card span-2">
        <div class="chart-header">
          <span class="chart-title">일별 매출 추이</span>
          <span class="chart-sub">Gross vs Net Revenue</span>
        </div>
        <canvas id="revenueChart"></canvas>
      </div>

      <div class="chart-card span-2">
        <div class="chart-header">
          <span class="chart-title">NRU & DAU</span>
          <span class="chart-sub">일별 추이</span>
        </div>
        <canvas id="userChart"></canvas>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">일별 판매량 & 환불</span>
        </div>
        <canvas id="salesRefundChart"></canvas>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">환불률 추이</span>
          <span class="chart-sub">%</span>
        </div>
        <canvas id="refundRateChart"></canvas>
      </div>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
